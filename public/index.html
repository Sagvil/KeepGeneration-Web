<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keep 截图生成器</title>
  <link rel="icon" href="/assets/favicon.png">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f6f8;
      color: #17181d;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(360px, 1fr);
      gap: 24px;
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: #fff;
      border: 1px solid #e8eaee;
      border-radius: 8px;
      padding: 20px;
    }

    h1 { margin: 0 0 4px; font-size: 24px; line-height: 1.25; }
    .sub, .hint, .status { margin: 0; color: #777b84; font-size: 13px; }
    .sub { margin-bottom: 18px; }
    form, fieldset { display: grid; gap: 12px; }
    fieldset { border: 0; padding: 0; margin: 0; }
    legend { padding: 8px 0 2px; font-weight: 700; color: #2c2e35; }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #62666f;
    }

    input, select {
      width: 100%;
      height: 40px;
      border: 1px solid #d8dbe2;
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
      color: #17181d;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .primary { color: #fff; background: #22c58e; }
    .secondary { color: #17181d; background: #eef0f3; }

    .preview {
      min-width: 0;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 12px;
    }

    canvas {
      width: min(100%, 420px);
      height: auto;
      background: #fff;
      box-shadow: 0 12px 36px rgba(31, 35, 44, .12);
    }

    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; padding: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Keep 截图生成器</h1>
      <p class="sub">所有数据可编辑，默认使用 SYSU 英东体育场地图。</p>

      <form id="dataForm">
        <fieldset>
          <legend>基础信息</legend>
          <label>用户名 <input name="username" value="keep"></label>
          <div class="grid">
            <label>日期 <input name="date" type="date" value="2026-05-13"></label>
            <label>结束时间 <input name="endTime" type="time" value="21:37"></label>
          </div>
          <div class="grid">
            <label>地点 <input name="location" value="SYSU 英东体育场"></label>
            <label>天气 <input name="weather" value="阴"></label>
          </div>
          <label>温度 <input name="temperature" value="30°C"></label>
          <p class="status" id="weatherStatus">更改日期、时间或地图后会自动查询天气。</p>
        </fieldset>

        <fieldset>
          <legend>运动数据</legend>
          <div class="grid">
            <label>公里数 <input name="totalKm" type="number" step="0.01" value="3.50"></label>
            <label>训练时长 <input name="sportTime" value="00:24:04"></label>
          </div>
          <div class="grid">
            <label>总时长 <input name="totalTime" value="00:24:04"></label>
            <label>平均配速 <input name="pace" value="06'53''"></label>
          </div>
          <div class="grid">
            <label>运动消耗 <input name="calories" type="number" value="228"></label>
            <label>运动负荷 <input name="exerciseLoad" type="number" value="51"></label>
          </div>
          <div class="grid">
            <label>平均心率 <input name="heartRate" type="number" value="166"></label>
            <label>平均步频 <input name="averageCadence" type="number" value="168"></label>
          </div>
          <div class="grid">
            <label>平均功率 <input name="power" type="number" value="157"></label>
            <label>平均步幅 <input name="stride" type="number" step="0.01" value="0.87"></label>
          </div>
          <label>累计爬升 <input name="cumulativeClimb" type="number" value="0"></label>
        </fieldset>

        <fieldset>
          <legend>分段详情</legend>
          <p class="status">分段会根据公里数和训练时长自动生成。</p>
        </fieldset>

        <fieldset>
          <legend>地图</legend>
          <select name="map" id="mapSelect"></select>
        </fieldset>

        <div class="actions">
          <button class="secondary" type="button" id="renderButton">刷新预览</button>
          <button class="primary" type="button" id="downloadScreenshot">下载截图</button>
        </div>
      </form>
    </section>

    <section class="preview">
      <canvas id="keepCanvas" width="1080" height="3700"></canvas>
      <p class="hint">预览会随输入自动刷新。</p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "keepFormState";
    const MAP_PRESETS = [
      ["default", "通用地图（无明显地理标识）", "/assets/maps/default.png"],
      ["map6", "SYSU 东校园体育场 1", "/assets/maps/map6.png"],
      ["map15", "SYSU 东校园体育场 2", "/assets/maps/map15.png"],
      ["map16", "SYSU 东校园体育场 3", "/assets/maps/map16.png"],
      ["map17", "SYSU 东校园体育场 4", "/assets/maps/map17.png"],
      ["map18", "SYSU 东校园体育场 5", "/assets/maps/map18.png"],
      ["map19", "SYSU 东校园体育场 6", "/assets/maps/map19.png"],
      ["map20", "SYSU 东校园体育场 7", "/assets/maps/map20.png"],
      ["map7", "SYSU 东校园环形大圈", "/assets/maps/map7.png"],
      ["map13", "大学城中环路", "/assets/maps/map13.png"],
      ["map4", "SYSU 英东体育场", "/assets/maps/map4.png"],
      ["map1", "SYSU 南校园大圈", "/assets/maps/map1.png"],
      ["map2", "SYSU 南校园小圈", "/assets/maps/map2.png"],
      ["map3", "SYSU 南校园中轴线", "/assets/maps/map3.png"],
      ["map5", "SYSU 南校园珠江南岸", "/assets/maps/map5.png"],
      ["map12", "二沙岛", "/assets/maps/map12.png"],
      ["map14", "花城广场", "/assets/maps/map14.png"],
      ["map8", "SYSU 珠海校区", "/assets/maps/map8.png"],
      ["map9", "苏州大学", "/assets/maps/map9.png"],
      ["map10", "中央财经大学", "/assets/maps/map10.png"],
      ["map11", "中南大学", "/assets/maps/map11.png"],
    ];

    const form = document.getElementById("dataForm");
    const mapSelect = document.getElementById("mapSelect");
    const weatherStatus = document.getElementById("weatherStatus");
    const canvas = document.getElementById("keepCanvas");
    const ctx = canvas.getContext("2d");
    const imageCache = new Map();

    function mapById(id) {
      return MAP_PRESETS.find(([mapId]) => mapId === id) || MAP_PRESETS.find(([mapId]) => mapId === "map4");
    }

    function setupMaps() {
      for (const [id, label, path] of MAP_PRESETS) {
        const option = document.createElement("option");
        option.value = id;
        option.dataset.path = path;
        option.textContent = label;
        if (id === "map4") option.selected = true;
        mapSelect.append(option);
      }
    }

    function values() {
      return Object.fromEntries(new FormData(form).entries());
    }

    function saveState() {
      localStorage.setItem("keepFormState", JSON.stringify(values()));
    }

    function restoreState() {
      const raw = localStorage.getItem("keepFormState");
      if (!raw) return;
      try {
        const state = JSON.parse(raw);
        for (const [key, value] of Object.entries(state)) {
          const field = form.elements.namedItem(key);
          if (field && typeof value === "string") field.value = value;
        }
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function loadImage(src) {
      if (!imageCache.has(src)) {
        imageCache.set(src, new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        }));
      }
      return imageCache.get(src);
    }

    function text(content, x, y, size, weight = 400, color = "#000", align = "left") {
      ctx.fillStyle = color;
      ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif`;
      ctx.textAlign = align;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(String(content), x, y);
    }

    function roundedRect(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    }

    function divider(y) {
      ctx.fillStyle = "#f7f7f7";
      ctx.fillRect(0, y, 1080, 38);
    }

    function detailButton(x, y) {
      roundedRect(x, y, 170, 72, 36, "#f7f7f7");
      text("查看详情", x + 30, y + 47, 31, 700);
    }

    function dateText(value) {
      return String(value || "").replaceAll("-", "/");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function parseHms(value, fallbackSeconds = 0) {
      const parts = String(value || "").split(":").map((part) => Number(part));
      if (parts.length === 2 && parts.every(Number.isFinite)) {
        return Math.max(0, parts[0] * 60 + parts[1]);
      }
      if (parts.length === 3 && parts.every(Number.isFinite)) {
        return Math.max(0, parts[0] * 3600 + parts[1] * 60 + parts[2]);
      }
      return fallbackSeconds;
    }

    function parseClockTime(value, fallbackSeconds = 0) {
      const parts = String(value || "").split(":").map((part) => Number(part));
      if (parts.length >= 2 && parts.every(Number.isFinite)) {
        return Math.max(0, parts[0] * 3600 + parts[1] * 60 + (parts[2] || 0));
      }
      return fallbackSeconds;
    }

    function calculateStatusTime(endTime, date) {
      const seed = `${date || ""} ${endTime || ""}`;
      let hash = 0;
      for (let i = 0; i < seed.length; i += 1) {
        hash = (hash * 31 + seed.charCodeAt(i)) >>> 0;
      }
      const offsetMinutes = 3 + (hash % 3);
      return secondsToHms((parseClockTime(endTime, 0) + offsetMinutes * 60) % (24 * 3600)).slice(0, 5);
    }

    function drawStatusBar(statusTime, statusIcons) {
      text(statusTime, 48, 54, 38, 700, "#111");
      ctx.drawImage(statusIcons, 500, 0, 560, 92);
    }

    function secondsToHms(seconds) {
      const safe = Math.max(0, Math.round(seconds));
      const hh = String(Math.floor(safe / 3600)).padStart(2, "0");
      const mm = String(Math.floor((safe % 3600) / 60)).padStart(2, "0");
      const ss = String(safe % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function secondsToMmss(seconds) {
      const safe = Math.max(0, Math.round(seconds));
      const mm = String(Math.floor(safe / 60)).padStart(2, "0");
      const ss = String(safe % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function secondsToPace(secondsPerKm) {
      const safe = Math.max(1, Math.round(secondsPerKm));
      const mm = String(Math.floor(safe / 60)).padStart(2, "0");
      const ss = String(safe % 60).padStart(2, "0");
      return `${mm}'${ss}''`;
    }

    function calculateStartTime(endTime, totalTime) {
      const endSeconds = parseClockTime(endTime, 0);
      const totalSeconds = parseHms(totalTime, 0);
      const day = 24 * 3600;
      const startSeconds = (endSeconds - totalSeconds + day) % day;
      return secondsToHms(startSeconds).slice(0, 5);
    }

    function buildSplitRows(totalKm, sportSeconds, averageHeartRate) {
      const safeKm = Math.max(0.01, Number(totalKm) || 0.01);
      const fullRows = Math.floor(safeKm);
      const remainder = Number((safeKm - fullRows).toFixed(2));
      const distances = Array.from({ length: fullRows }, () => 1);
      if (remainder >= 0.01 || distances.length === 0) distances.push(Math.max(0.01, remainder));

      const avgPace = sportSeconds / safeKm;
      const factors = [1.03, 0.95, 1.02, 0.99, 1.06, 0.98, 1.01, 1.04];
      const rawSeconds = distances.map((distance, index) => avgPace * distance * factors[index % factors.length]);
      const rawTotal = rawSeconds.reduce((sum, seconds) => sum + seconds, 0);
      const rowSeconds = rawSeconds.map((seconds) => Math.max(1, Math.round(seconds * sportSeconds / rawTotal)));
      rowSeconds[rowSeconds.length - 1] += Math.round(sportSeconds) - rowSeconds.reduce((sum, seconds) => sum + seconds, 0);

      const fastestIndex = rowSeconds.reduce((best, seconds, index) => {
        const pace = seconds / distances[index];
        const bestPace = rowSeconds[best] / distances[best];
        return pace < bestPace ? index : best;
      }, 0);

      return distances.map((distance, index) => ({
        index: index + 1,
        badge: index === fastestIndex ? "最快" : "",
        distance,
        time: secondsToMmss(rowSeconds[index]),
        pace: secondsToPace(rowSeconds[index] / distance),
        heartRate: Math.round(clamp(averageHeartRate + [-8, 4, 1, -2, 3, 0, -4, 2][index % 8], 120, 188)),
        active: index === fastestIndex,
      }));
    }

    function deriveRunData(raw) {
      const totalKm = Math.max(0.01, Number(raw.totalKm) || 0.01);
      const sportSeconds = parseHms(raw.sportTime, 1);
      const totalSeconds = Math.max(sportSeconds, parseHms(raw.totalTime, sportSeconds));
      const paceSeconds = sportSeconds / totalKm;
      const sportMinutes = sportSeconds / 60;
      const cadence = Math.round(clamp(176 - (paceSeconds - 300) * 0.07, 150, 178));
      const heartRate = Math.round(clamp(202 - paceSeconds * 0.07 + totalKm, 132, 178));
      const speedMetersPerMinute = totalKm * 1000 / sportMinutes;
      const derivedStride = clamp(speedMetersPerMinute / cadence, 0.65, 1.35).toFixed(2);
      const manualStride = Number(raw.stride);
      const stride = Number.isFinite(manualStride) && manualStride > 0 ? manualStride.toFixed(2) : derivedStride;
      const calories = Math.round(totalKm * 65);
      const power = Math.round(clamp(speedMetersPerMinute * 1.15, 105, 280));
      const exerciseLoad = Math.round(clamp(sportMinutes * (heartRate / 180) * 2.3, 10, 150));
      const derived = {
        ...raw,
        totalKm,
        sportTime: secondsToHms(sportSeconds),
        totalTime: secondsToHms(totalSeconds),
        startTime: calculateStartTime(raw.endTime, secondsToHms(totalSeconds)),
        statusTime: calculateStatusTime(raw.endTime, raw.date),
        pace: secondsToPace(paceSeconds),
        calories,
        exerciseLoad,
        heartRate,
        averageCadence: cadence,
        power,
        stride,
      };
      derived.splitRows = buildSplitRows(totalKm, sportSeconds, heartRate);
      return derived;
    }

    function syncDerivedFields(data) {
      for (const key of ["sportTime", "totalTime", "pace", "calories", "exerciseLoad", "heartRate", "averageCadence", "power"]) {
        const field = form.elements.namedItem(key);
        if (field) field.value = String(data[key]);
      }
    }

    async function fetchWeather() {
      const v = values();
      if (!v.date || !v.endTime || !v.map) {
        weatherStatus.textContent = "天气查询失败：缺少日期、时间或地图。";
        return false;
      }
      weatherStatus.textContent = "正在查询天气...";
      try {
        const response = await fetch(`/api/weather?map=${encodeURIComponent(v.map)}&date=${encodeURIComponent(v.date)}&time=${encodeURIComponent(v.endTime)}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        if (data.weather) form.elements.weather.value = data.weather;
        if (data.temperature) form.elements.temperature.value = data.temperature;
        weatherStatus.textContent = `查询成功：${data.weather || form.elements.weather.value} ${data.temperature || form.elements.temperature.value}`;
        saveState();
        await render();
        return true;
      } catch (error) {
        weatherStatus.textContent = `查询失败：${error.message}，已保留当前手动输入。`;
        return false;
      }
    }

    async function refreshPreview() {
      await fetchWeather();
      await render();
    }

    async function render() {
      const v = deriveRunData(values());
      syncDerivedFields(v);
      const [, , mapPath] = mapById(v.map);
      const [map, statusIcons] = await Promise.all([
        loadImage(mapPath),
        loadImage("/assets/status-icons.png"),
      ]);
      canvas.height = Math.max(3700, 3476 + v.splitRows.length * 80 + 48);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawStatusBar(v.statusTime, statusIcons);
      text("‹", 55, 168, 82, 300);
      roundedRect(635, 92, 145, 72, 36, "#f7f7f7");
      text("▣ 隐私", 660, 139, 32, 700);
      text("↗  ⋯", 870, 144, 64, 700);

      roundedRect(65, 208, 74, 74, 37, "#f4f4f4");
      text((v.username || "K").slice(0, 1), 89, 258, 34, 700, "#ddd");
      text(v.username || "keep", 160, 248, 42, 700);
      text(`${dateText(v.date)} ${v.startTime} - ${v.endTime} ${v.location} · ${v.weather} · ${v.temperature}`, 160, 292, 32, 400, "#8f8f94");

      text("🏃 户外跑步", 65, 426, 48, 800, "#292a33");
      text(Number(v.totalKm || 0).toFixed(2), 58, 616, 170, 900);
      text("公里", 438, 616, 48);

      ctx.globalAlpha = 0.72;
      ctx.drawImage(map, 40, 686, 1000, 800);
      ctx.globalAlpha = 1;
      text("运动数据", 58, 1546, 48, 800, "#292a33");
      detailButton(835, 1494);
      const metrics = [
        ["训练时长", v.sportTime, "", 58, 1676],
        ["平均配速", v.pace, "", 430, 1676],
        ["运动消耗", v.calories, "千卡", 790, 1676],
        ["总时长", v.totalTime, "", 58, 1836],
        ["运动负荷", v.exerciseLoad, "", 430, 1836],
        ["平均心率", v.heartRate, "次/分", 790, 1836],
        ["平均步频", v.averageCadence, "", 58, 1996],
        ["平均功率", v.power, "瓦", 430, 1996],
        ["平均步幅", v.stride, "米", 790, 1996],
      ];
      for (const [label, value, unit, x, y] of metrics) {
        text(label, x, y, 34, 600, "#a0a0a4");
        text(value, x, y + 72, 58, 900);
        if (unit) text(unit, x + 125, y + 72, 30, 600);
      }

      divider(2156);
      text("运动趋势", 58, 2296, 48, 800, "#292a33");
      roundedRect(270, 2254, 66, 40, 10, "#dcb05c");
      text("会员", 281, 2284, 24, 700, "#fff");
      detailButton(835, 2244);
      text(`与上次 ${(Number(v.totalKm || 0) - .25).toFixed(2)} 公里跑步各项数据对比`, 58, 2411, 34, 700, "#999");
      roundedRect(58, 2496, 145, 58, 29, "#7a5df0");
      text("▲ 上升", 82, 2535, 30, 700, "#fff");
      roundedRect(430, 2496, 145, 58, 29, "#27c798");
      text("▼ 下降", 452, 2535, 30, 700, "#fff");
      roundedRect(790, 2496, 145, 58, 29, "#efefef");
      text("━ 持平", 815, 2535, 30, 700, "#888");
      text("8", 58, 2636, 58, 900);
      text("项", 120, 2636, 28);
      text("4", 430, 2636, 58, 900);
      text("项", 492, 2636, 28);
      text("0", 790, 2636, 58, 900);
      text("项", 852, 2636, 28);

      divider(2721);
      text("特别成就", 58, 2861, 48, 800, "#292a33");
      text("（共 1 个）", 270, 2861, 30, 600, "#999");
      roundedRect(65, 2941, 94, 94, 47, "#eee");
      roundedRect(88, 2964, 48, 48, 24, "#f3d952");
      text("Lv", 97, 2999, 20);
      text("获得新徽章 ›", 200, 2981, 30, 700, "#ccc");
      text("五月挑战 Lv1", 200, 3031, 40, 800);

      divider(3141);
      text("分段详情", 58, 3281, 48, 800, "#292a33");
      roundedRect(705, 3231, 72, 72, 36, "#f7f7f7");
      text("↗", 725, 3283, 40, 700);
      detailButton(835, 3231);
      text("#", 78, 3401, 28, 600, "#999");
      text("公里", 255, 3401, 28, 600, "#999");
      text("用时", 490, 3401, 28, 600, "#999");
      text("配速", 710, 3401, 28, 600, "#999");
      text("心率", 925, 3401, 28, 600, "#999");
      renderRows(v.splitRows);
    }

    function renderRows(rows) {
      let y = 3476;
      for (const row of rows) {
        const active = row.active;
        if (active) roundedRect(55, y - 48, 970, 64, 32, "#42ca9d");
        const color = active ? "#fff" : "#666";
        const muted = active ? "#fff" : "#aaa";
        text(row.index, 78, y, 32, 500, muted);
        text(row.badge, 160, y, 30, 700, color);
        text(row.distance.toFixed(2), 255, y, 32, 500, color);
        text(row.time, 490, y, 32, 500, color);
        text(row.pace, 710, y, 32, 600, active ? "#fff" : "#20c28e");
        text(row.heartRate, 925, y, 32, 600, active ? "#fff" : "#e54e70");
        y += 80;
      }
    }

    function canvasToBlob() {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("无法生成图片文件"));
        }, "image/png");
      });
    }

    function isMobileSaveHost() {
      return /Quark|UCBrowser|MicroMessenger|MQQBrowser|QQBrowser|iPhone|iPad|iPod|Android|Mobile/i.test(navigator.userAgent);
    }

    function prepareSavePage() {
      if (!isMobileSaveHost()) return null;
      const page = window.open("", "_blank");
      if (!page) return null;
      page.document.write(`<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>正在生成图片</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;color:#17181d}.wrap{padding:18px;text-align:center}.tip{margin:0 0 14px;color:#62666f;font-size:15px;line-height:1.6}</style></head><body><div class="wrap"><p class="tip">正在生成图片，请稍候...</p></div></body></html>`);
      page.document.close();
      return page;
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error("图片读取失败"));
        reader.readAsDataURL(blob);
      });
    }

    async function showSavePage(page, blob, filename) {
      const dataUrl = await blobToDataUrl(blob);
      const html = `<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${filename}</title><style>body{margin:0;background:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#17181d}.bar{position:sticky;top:0;background:rgba(255,255,255,.96);padding:12px 14px;border-bottom:1px solid #e8eaee}.bar h1{font-size:17px;margin:0 0 4px}.bar p{font-size:14px;margin:0;color:#62666f;line-height:1.5}.image{display:block;width:100%;max-width:720px;margin:0 auto;background:#fff}</style></head><body><div class="bar"><h1>图片已生成</h1><p>长按图片保存到相册。若浏览器提示分享或保存，也可以直接使用系统菜单。</p></div><img class="image" src="${dataUrl}" alt="Keep 跑步截图"></body></html>`;
      if (page && !page.closed) {
        page.document.open();
        page.document.write(html);
        page.document.close();
        return true;
      }
      const opened = window.open("", "_blank");
      if (opened) {
        opened.document.write(html);
        opened.document.close();
        return true;
      }
      return false;
    }

    function openImageFallback(blob) {
      const objectUrl = URL.createObjectURL(blob);
      location.href = objectUrl;
      setTimeout(() => URL.revokeObjectURL(objectUrl), 60_000);
    }

    async function download() {
      const savePage = prepareSavePage();
      const blob = await canvasToBlob();
      const filename = `keep-${Date.now()}.png`;
      const file = new File([blob], filename, { type: "image/png" });

      if (navigator.canShare?.({ files: [file] }) && navigator.share) {
        try {
          await navigator.share({ files: [file], title: "Keep 跑步截图" });
          if (savePage && !savePage.closed) savePage.close();
          return;
        } catch (error) {
          if (error?.name === "AbortError") {
            if (savePage && !savePage.closed) savePage.close();
            return;
          }
        }
      }

      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = filename;
      link.href = objectUrl;
      link.click();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 60_000);

      if (isMobileSaveHost()) {
        const shown = await showSavePage(savePage, blob, filename);
        if (!shown) openImageFallback(blob);
      }
    }

    function updateLocationFromMap() {
      const [, label] = mapById(mapSelect.value);
      form.elements.location.value = label;
    }

    let weatherTimer = 0;
    function queueWeatherFetch() {
      clearTimeout(weatherTimer);
      weatherTimer = setTimeout(() => fetchWeather(), 350);
    }

    setupMaps();
    restoreState();
    form.addEventListener("input", () => {
      saveState();
      render().catch(console.error);
    });
    for (const name of ["date", "endTime"]) {
      form.elements[name].addEventListener("change", queueWeatherFetch);
    }
    mapSelect.addEventListener("change", () => {
      updateLocationFromMap();
      saveState();
      queueWeatherFetch();
      render().catch(console.error);
    });
    document.getElementById("renderButton").addEventListener("click", () => refreshPreview().catch(console.error));
    document.getElementById("downloadScreenshot").addEventListener("click", download);
    render().catch(console.error);
  </script>
</body>
</html>
