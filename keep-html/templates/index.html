<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep运动截图生成器</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://lib.baomitu.com/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .range-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .range-input input {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <h1 class="mb-4 text-center">Keep运动截图生成器</h1>

        <p class="text-center mb-4">
            项目地址：<a href="https://github.com/eltsen00/KeepGeneration-Web" target="_blank">https://github.com/eltsen00/KeepGeneration-Web</a>
        </p>

        <form id="generateForm" enctype="multipart/form-data">
            <!-- 文件上传部分 -->
            <div class="form-section">
                <h4>🗺️ 地图设置</h4>
                <div class="row g-3 mb-4">
                    <!-- 左侧：选择和上传 -->
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">预设地图</label>
                            <select class="form-select" name="map_preset" id="mapPresetSelect">
                                {% for map_name, map_path in map_presets.items() %}
                                <option value="{{ map_name }}" data-url="{{ map_path }}">{{ map_name }}</option>
                                {% endfor %}
                            </select>
                            <div class="form-text mt-2">选择一个预设地图</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">或上传自定义地图(预设地图将失效)</label>
                            <input type="file" class="form-control" name="custom_map" id="customMapInput" accept="image/*">
                            <div class="form-text mt-2">支持PNG/JPG/JPEG/WEBP格式，建议尺寸1000×800px</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">用户头像（可选）</label>
                            <input type="file" class="form-control" name="avatar" accept="image/*">
                            <div class="form-text mt-2">不上传将使用默认头像</div>
                        </div>
                    </div>
                    
                    <!-- 右侧：地图预览 -->
                    <div class="col-md-6 d-flex flex-column align-items-center justify-content-center">
                        <label class="form-label mb-2">地图预览</label>
                        <div class="border rounded bg-light p-2 d-flex align-items-center justify-content-center" style="width: 100%; height: 100%; min-height: 200px;">
                            <img id="mapPreview" src="" alt="地图预览" style="max-height: 300px; max-width: 100%; object-fit: contain;">
                        </div>
                    </div>
                </div>
            </div>


            <!-- 基础信息 -->
            <div class="form-section">
                <h4>👤 基本信息</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" name="username" value="{{ default_config.username }}"
                            required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">日期</label>
                        <input type="date" class="form-control" name="date" value="{{ default_config.date }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">结束时间</label>
                        <input type="time" class="form-control" name="end_time" value="{{ default_config.end_time }}"
                            required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">地点</label>
                        <input type="text" class="form-control" name="location" value="{{ default_config.location }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">天气</label>
                        <input type="text" class="form-control" name="weather" value="{{ default_config.weather }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">温度</label>
                        <input type="text" class="form-control" name="temperature" value="{{ default_config.temperature }}" required>
                    </div>
                </div>
            </div>

            <!-- 运动参数 -->
            <div class="form-section">
                <h4>🏃 运动参数</h4>
                <div class="row g-3">
                    <!-- 总公里数 -->
                    <div class="col-md-4">
                        <label class="form-label">总公里数范围 (km)</label>
                        <div class="range-input">
                            <input type="number" step="0.01" class="form-control" name="total_km_min"
                                value="{{ default_config.total_km[0] }}" min="0" required>
                            <span>-</span>
                            <input type="number" step="0.01" class="form-control" name="total_km_max"
                                value="{{ default_config.total_km[1] }}" min="0" required>
                        </div>
                    </div>

                    <!-- 运动时间 -->
                    <div class="col-md-4">
                        <label class="form-label">运动时间范围</label>
                        <div class="range-input">
                            <input type="text" class="form-control" name="sport_time_min"
                                value="{{ default_config.sport_time[0] }}" required>
                            <span>-</span>
                            <input type="text" class="form-control" name="sport_time_max"
                                value="{{ default_config.sport_time[1] }}" required>
                        </div>
                    </div>

                    <!-- 总时间 -->
                    <div class="col-md-4">
                        <label class="form-label">总时间范围</label>
                        <div class="range-input">
                            <input type="text" class="form-control" name="total_time_min"
                                value="{{ default_config.total_time[0] }}" required>
                            <span>-</span>
                            <input type="text" class="form-control" name="total_time_max"
                                value="{{ default_config.total_time[1] }}" required>
                        </div>
                    </div>

                    <!-- 累计爬升 -->
                    <div class="col-md-4">
                        <label class="form-label">累计爬升 (米)</label>
                        <div class="range-input">
                            <input type="number" class="form-control" name="cumulative_climb_min"
                                value="{{ default_config.cumulative_climb[0] }}" min="0" required>
                            <span>-</span>
                            <input type="number" class="form-control" name="cumulative_climb_max"
                                value="{{ default_config.cumulative_climb[1] }}" min="0" required>
                        </div>
                    </div>

                    <!-- 平均步频 -->
                    <div class="col-md-4">
                        <label class="form-label">平均步频 (步/分钟)</label>
                        <div class="range-input">
                            <input type="number" class="form-control" name="average_cadence_min"
                                value="{{ default_config.average_cadence[0] }}" min="0" required>
                            <span>-</span>
                            <input type="number" class="form-control" name="average_cadence_max"
                                value="{{ default_config.average_cadence[1] }}" min="0" required>
                        </div>
                    </div>

                    <!-- 运动负荷 -->
                    <div class="col-md-4">
                        <label class="form-label">运动负荷</label>
                        <div class="range-input">
                            <input type="number" class="form-control" name="exercise_load_min"
                                value="{{ default_config.exercise_load[0] }}" min="0" required>
                            <span>-</span>
                            <input type="number" class="form-control" name="exercise_load_max"
                                value="{{ default_config.exercise_load[1] }}" min="0" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">🚀 生成运动数据图</button>
            </div>
        </form>
    </div>
    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true" style="display: none;">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">🎉 生成成功！</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="resultImage" src="" class="img-fluid mb-3 shadow-sm rounded" alt="Result">
                    <div class="d-grid gap-2 col-8 mx-auto">
                        <a id="downloadBtn" href="#" class="btn btn-success btn-lg">📥 下载原图</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载中遮罩 -->
    <div id="loadingOverlay"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4 class="text-primary">正在生成运动数据和轨迹...</h4>
    </div>
    <script src="https://lib.baomitu.com/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script>
        // Map Preview Logic
        const mapPresetSelect = document.getElementById('mapPresetSelect');
        const customMapInput = document.getElementById('customMapInput');
        const mapPreview = document.getElementById('mapPreview');

        function updateMapPreview() {
            const file = customMapInput.files[0];
            if (file) {
                // If custom file selected, show it
                const reader = new FileReader();
                reader.onload = function (e) {
                    mapPreview.src = e.target.result;
                }
                reader.readAsDataURL(file);
            } else {
                // Show preset
                const selectedOption = mapPresetSelect.options[mapPresetSelect.selectedIndex];
                const url = selectedOption.getAttribute('data-url');
                mapPreview.src = url;
            }
        }

        // Event Listeners
        mapPresetSelect.addEventListener('change', function() {
            // Clear custom file input when preset changes so preset takes effect
            customMapInput.value = ''; 
            updateMapPreview();
        });

        customMapInput.addEventListener('change', updateMapPreview);

        // Initialize
        updateMapPreview();

        document.getElementById('generateForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const loading = document.getElementById('loadingOverlay');
            const submitBtn = this.querySelector('button[type="submit"]');
            
            // 显示加载状态
            loading.style.display = 'flex';
            submitBtn.disabled = true;

            try {
                const formData = new FormData(this);
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // 更新并显示模态框
                    document.getElementById('resultImage').src = data.image_url;
                    document.getElementById('downloadBtn').href = data.download_url;
                    new bootstrap.Modal(document.getElementById('resultModal')).show();
                } else {
                    alert('生成失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('网络请求出错，请检查控制台');
            } finally {
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
