<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keep 截图生成器</title>
  <link rel="icon" href="/assets/favicon.png">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f6f8;
      color: #17181d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(360px, 1fr);
      gap: 24px;
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: #fff;
      border: 1px solid #e8eaee;
      border-radius: 8px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      line-height: 1.25;
    }

    .sub {
      margin: 0 0 18px;
      color: #777b84;
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    legend {
      padding: 8px 0 2px;
      font-weight: 700;
      color: #2c2e35;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #62666f;
    }

    input, select {
      width: 100%;
      height: 40px;
      border: 1px solid #d8dbe2;
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
      color: #17181d;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      color: #fff;
      background: #22c58e;
    }

    .secondary {
      color: #17181d;
      background: #eef0f3;
    }

    .preview {
      min-width: 0;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 12px;
    }

    canvas {
      width: min(100%, 420px);
      height: auto;
      background: #fff;
      box-shadow: 0 12px 36px rgba(31, 35, 44, .12);
    }

    .hint {
      margin: 0;
      font-size: 13px;
      color: #777b84;
    }

    @media (max-width: 920px) {
      main {
        grid-template-columns: 1fr;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Keep 截图生成器</h1>
      <p class="sub">所有数据可编辑，默认使用 SYSU 英东体育场地图。</p>

      <form id="dataForm">
        <fieldset>
          <legend>基础信息</legend>
          <label>用户名 <input name="username" value="郑竣仁23343093"></label>
          <div class="grid">
            <label>日期 <input name="date" type="date" value="2026-05-13"></label>
            <label>结束时间 <input name="endTime" type="time" value="21:37"></label>
          </div>
          <div class="grid">
            <label>地点 <input name="location" value="广州市"></label>
            <label>天气 <input name="weather" value="阴"></label>
          </div>
          <label>温度 <input name="temperature" value="30°C"></label>
        </fieldset>

        <fieldset>
          <legend>运动数据</legend>
          <div class="grid">
            <label>公里数 <input name="totalKm" type="number" step="0.01" value="3.01"></label>
            <label>训练时长 <input name="sportTime" value="00:24:04"></label>
          </div>
          <div class="grid">
            <label>总时长 <input name="totalTime" value="00:24:04"></label>
            <label>平均配速 <input name="pace" value="07'58''"></label>
          </div>
          <div class="grid">
            <label>运动消耗 <input name="calories" type="number" value="196"></label>
            <label>运动负荷 <input name="exerciseLoad" type="number" value="87"></label>
          </div>
          <div class="grid">
            <label>平均心率 <input name="heartRate" type="number" value="169"></label>
            <label>平均步频 <input name="averageCadence" type="number" value="136"></label>
          </div>
          <div class="grid">
            <label>平均功率 <input name="power" type="number" value="153"></label>
            <label>平均步幅 <input name="stride" type="number" step="0.01" value="0.84"></label>
          </div>
          <label>累计爬升 <input name="cumulativeClimb" type="number" value="0"></label>
        </fieldset>

        <fieldset>
          <legend>分段详情</legend>
          <div class="grid">
            <label>第 1 公里 <input name="split1" value="07:08"></label>
            <label>第 1 心率 <input name="splitHr1" type="number" value="157"></label>
          </div>
          <div class="grid">
            <label>第 2 公里 <input name="split2" value="06:07"></label>
            <label>第 2 心率 <input name="splitHr2" type="number" value="174"></label>
          </div>
          <div class="grid">
            <label>第 3 公里 <input name="split3" value="19:00"></label>
            <label>第 3 心率 <input name="splitHr3" type="number" value="170"></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>地图</legend>
          <select name="map">
            <option value="/assets/maps/map4.png" selected>SYSU 英东体育场</option>
          </select>
        </fieldset>

        <div class="actions">
          <button class="secondary" type="button" id="renderButton">刷新预览</button>
          <button class="primary" type="button" id="downloadScreenshot">下载截图</button>
        </div>
      </form>
    </section>

    <section class="preview">
      <canvas id="keepCanvas" width="1080" height="3600"></canvas>
      <p class="hint">预览会随输入自动刷新。</p>
    </section>
  </main>

  <script>
    const form = document.getElementById("dataForm");
    const canvas = document.getElementById("keepCanvas");
    const ctx = canvas.getContext("2d");
    const imageCache = new Map();

    function values() {
      return Object.fromEntries(new FormData(form).entries());
    }

    function loadImage(src) {
      if (!imageCache.has(src)) {
        imageCache.set(src, new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        }));
      }
      return imageCache.get(src);
    }

    function text(content, x, y, size, weight = 400, color = "#000", align = "left") {
      ctx.fillStyle = color;
      ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif`;
      ctx.textAlign = align;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(String(content), x, y);
    }

    function roundedRect(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    }

    function divider(y) {
      ctx.fillStyle = "#f7f7f7";
      ctx.fillRect(0, y, 1080, 38);
    }

    function detailButton(x, y) {
      roundedRect(x, y, 170, 72, 36, "#f7f7f7");
      text("查看详情", x + 30, y + 47, 31, 700);
    }

    function dateText(value) {
      return value.replaceAll("-", "/");
    }

    async function render() {
      const v = values();
      const map = await loadImage(v.map);
      canvas.height = 3920;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      text(v.endTime, 70, 70, 38);
      text("⌁⌁⌁  WiFi  93%", 775, 68, 28);
      text("‹", 55, 190, 82, 300);
      roundedRect(635, 126, 145, 72, 36, "#f7f7f7");
      text("▣ 隐私", 660, 173, 32, 700);
      text("↗  ⋯", 870, 178, 64, 700);

      roundedRect(65, 242, 74, 74, 37, "#f4f4f4");
      text((v.username || "K").slice(0, 1), 89, 292, 34, 700, "#ddd");
      text(v.username, 160, 282, 42, 700);
      text(`${dateText(v.date)} ${v.endTime} - ${v.endTime} ${v.location} · ${v.weather} · ${v.temperature}`, 160, 326, 32, 400, "#8f8f94");

      text("🏃 户外跑步", 65, 460, 48, 800, "#292a33");
      text(Number(v.totalKm).toFixed(2), 58, 650, 170, 900);
      text("公里", 438, 650, 48);

      ctx.globalAlpha = 0.72;
      ctx.drawImage(map, 40, 720, 1000, 800);
      ctx.globalAlpha = 1;
      roundedRect(910, 755, 100, 245, 4, "rgba(255,255,255,.85)");
      text("⛶", 944, 825, 48, 800);
      text("全屏", 936, 872, 26);
      text("▶", 943, 942, 48, 800);
      text("视频", 936, 990, 26);
      text("慢", 88, 1468, 28, 700, "#e75f6a");
      ctx.strokeStyle = "#2dcfb5";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(130, 1460);
      ctx.lineTo(240, 1460);
      ctx.stroke();
      text("快", 255, 1468, 28, 700, "#14c8cc");
      ctx.fillStyle = "rgba(245,255,249,.9)";
      ctx.fillRect(40, 1520, 1000, 100);
      text("📍 获得了 1 个跑步路线成绩", 85, 1586, 42, 800);
      text("›", 985, 1590, 70, 700);

      text("运动数据", 58, 1740, 48, 800, "#292a33");
      detailButton(835, 1688);
      const metrics = [
        ["训练时长", v.sportTime, "", 58, 1870],
        ["平均配速", v.pace, "", 430, 1870],
        ["运动消耗", v.calories, "千卡", 790, 1870],
        ["总时长", v.totalTime, "", 58, 2030],
        ["运动负荷", v.exerciseLoad, "", 430, 2030],
        ["平均心率", v.heartRate, "次/分", 790, 2030],
        ["平均步频", v.averageCadence, "", 58, 2190],
        ["平均功率", v.power, "瓦", 430, 2190],
        ["平均步幅", v.stride, "米", 790, 2190],
      ];
      for (const [label, value, unit, x, y] of metrics) {
        text(label, x, y, 34, 600, "#a0a0a4");
        text(value, x, y + 72, 58, 900);
        if (unit) text(unit, x + 125, y + 72, 30, 600);
      }

      divider(2350);
      text("运动趋势", 58, 2490, 48, 800, "#292a33");
      roundedRect(270, 2448, 66, 40, 10, "#dcb05c");
      text("会员", 281, 2478, 24, 700, "#fff");
      detailButton(835, 2438);
      text(`与上次 ${(Number(v.totalKm) - .25).toFixed(2)} 公里跑步各项数据对比`, 58, 2605, 34, 700, "#999");
      roundedRect(58, 2690, 145, 58, 29, "#7a5df0");
      text("▲ 上升", 82, 2729, 30, 700, "#fff");
      roundedRect(430, 2690, 145, 58, 29, "#27c798");
      text("▼ 下降", 452, 2729, 30, 700, "#fff");
      roundedRect(790, 2690, 145, 58, 29, "#efefef");
      text("━ 持平", 815, 2729, 30, 700, "#888");
      text("8", 58, 2830, 58, 900);
      text("项", 120, 2830, 28);
      text("4", 430, 2830, 58, 900);
      text("项", 492, 2830, 28);
      text("0", 790, 2830, 58, 900);
      text("项", 852, 2830, 28);

      divider(2915);
      text("特别成就", 58, 3055, 48, 800, "#292a33");
      text("（共 1 个）", 270, 3055, 30, 600, "#999");
      roundedRect(65, 3135, 94, 94, 47, "#eee");
      roundedRect(88, 3158, 48, 48, 24, "#f3d952");
      text("Lv", 97, 3193, 20);
      text("获得新徽章 ›", 200, 3175, 30, 700, "#ccc");
      text("五月挑战 Lv1", 200, 3225, 40, 800);

      divider(3335);
      text("分段详情", 58, 3475, 48, 800, "#292a33");
      roundedRect(705, 3425, 72, 72, 36, "#f7f7f7");
      text("↗", 725, 3477, 40, 700);
      detailButton(835, 3425);
      text("#", 78, 3595, 28, 600, "#999");
      text("公里", 255, 3595, 28, 600, "#999");
      text("用时", 490, 3595, 28, 600, "#999");
      text("配速", 710, 3595, 28, 600, "#999");
      text("心率", 925, 3595, 28, 600, "#999");
      await renderRows(v);
    }

    async function renderRows(v) {
      const rows = [
        ["1", "", "1.00", v.split1, v.split1.replace(":", "'") + "''", v.splitHr1],
        ["2", "最快", "1.00", v.split2, v.split2.replace(":", "'") + "''", v.splitHr2],
        ["3", "", "1.00", v.split3, v.split3.replace(":", "'") + "''", v.splitHr3],
      ];
      let y = 3670;
      for (const row of rows) {
        const active = row[0] === "2";
        if (active) roundedRect(55, y - 48, 970, 64, 32, "#42ca9d");
        const color = active ? "#fff" : "#666";
        const muted = active ? "#fff" : "#aaa";
        text(row[0], 78, y, 32, 500, muted);
        text(row[1], 160, y, 30, 700, color);
        text(row[2], 255, y, 32, 500, color);
        text(row[3], 490, y, 32, 500, color);
        text(row[4], 710, y, 32, 600, active ? "#fff" : "#20c28e");
        text(row[5], 925, y, 32, 600, active ? "#fff" : "#e54e70");
        y += 80;
      }
    }

    function download() {
      const link = document.createElement("a");
      link.download = `keep-${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    document.getElementById("renderButton").addEventListener("click", render);
    document.getElementById("downloadScreenshot").addEventListener("click", download);
    form.addEventListener("input", () => render().catch(console.error));
    render().catch(console.error);
  </script>
</body>
</html>
