<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keep 截图生成器</title>
  <link rel="icon" href="/assets/favicon.png">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f6f8;
      color: #17181d;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(360px, 1fr);
      gap: 24px;
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: #fff;
      border: 1px solid #e8eaee;
      border-radius: 8px;
      padding: 20px;
    }

    h1 { margin: 0 0 4px; font-size: 24px; line-height: 1.25; }
    .sub, .hint, .status { margin: 0; color: #777b84; font-size: 13px; }
    .sub { margin-bottom: 18px; }
    form, fieldset { display: grid; gap: 12px; }
    fieldset { border: 0; padding: 0; margin: 0; }
    legend { padding: 8px 0 2px; font-weight: 700; color: #2c2e35; }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #62666f;
    }

    input, select {
      width: 100%;
      height: 40px;
      border: 1px solid #d8dbe2;
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
      color: #17181d;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .primary { color: #fff; background: #22c58e; }
    .secondary { color: #17181d; background: #eef0f3; }

    .preview {
      min-width: 0;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 12px;
    }

    canvas {
      width: min(100%, 420px);
      height: auto;
      background: #fff;
      box-shadow: 0 12px 36px rgba(31, 35, 44, .12);
    }

    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; padding: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Keep 截图生成器</h1>
      <p class="sub">所有数据可编辑，默认使用 SYSU 英东体育场地图。</p>

      <form id="dataForm">
        <fieldset>
          <legend>基础信息</legend>
          <label>用户名 <input name="username" value="keep"></label>
          <div class="grid">
            <label>日期 <input name="date" type="date" value="2026-05-13"></label>
            <label>结束时间 <input name="endTime" type="time" value="21:37"></label>
          </div>
          <div class="grid">
            <label>地点 <input name="location" value="SYSU 英东体育场"></label>
            <label>天气 <input name="weather" value="阴"></label>
          </div>
          <label>温度 <input name="temperature" value="30°C"></label>
          <p class="status" id="weatherStatus">更改日期、时间或地图后会自动查询天气。</p>
        </fieldset>

        <fieldset>
          <legend>运动数据</legend>
          <div class="grid">
            <label>公里数 <input name="totalKm" type="number" step="0.01" value="3.01"></label>
            <label>训练时长 <input name="sportTime" value="00:24:04"></label>
          </div>
          <div class="grid">
            <label>总时长 <input name="totalTime" value="00:24:04"></label>
            <label>平均配速 <input name="pace" value="07'58''"></label>
          </div>
          <div class="grid">
            <label>运动消耗 <input name="calories" type="number" value="196"></label>
            <label>运动负荷 <input name="exerciseLoad" type="number" value="87"></label>
          </div>
          <div class="grid">
            <label>平均心率 <input name="heartRate" type="number" value="169"></label>
            <label>平均步频 <input name="averageCadence" type="number" value="136"></label>
          </div>
          <div class="grid">
            <label>平均功率 <input name="power" type="number" value="153"></label>
            <label>平均步幅 <input name="stride" type="number" step="0.01" value="0.84"></label>
          </div>
          <label>累计爬升 <input name="cumulativeClimb" type="number" value="0"></label>
        </fieldset>

        <fieldset>
          <legend>分段详情</legend>
          <div class="grid">
            <label>第 1 公里 <input name="split1" value="07:08"></label>
            <label>第 1 心率 <input name="splitHr1" type="number" value="157"></label>
          </div>
          <div class="grid">
            <label>第 2 公里 <input name="split2" value="06:07"></label>
            <label>第 2 心率 <input name="splitHr2" type="number" value="174"></label>
          </div>
          <div class="grid">
            <label>第 3 公里 <input name="split3" value="19:00"></label>
            <label>第 3 心率 <input name="splitHr3" type="number" value="170"></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>地图</legend>
          <select name="map" id="mapSelect"></select>
        </fieldset>

        <div class="actions">
          <button class="secondary" type="button" id="renderButton">刷新预览</button>
          <button class="primary" type="button" id="downloadScreenshot">下载截图</button>
        </div>
      </form>
    </section>

    <section class="preview">
      <canvas id="keepCanvas" width="1080" height="3820"></canvas>
      <p class="hint">预览会随输入自动刷新。</p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "keepFormState";
    const MAP_PRESETS = [
      ["default", "通用地图（无明显地理标识）", "/assets/maps/default.png"],
      ["map6", "SYSU 东校园体育场 1", "/assets/maps/map6.png"],
      ["map15", "SYSU 东校园体育场 2", "/assets/maps/map15.png"],
      ["map16", "SYSU 东校园体育场 3", "/assets/maps/map16.png"],
      ["map17", "SYSU 东校园体育场 4", "/assets/maps/map17.png"],
      ["map18", "SYSU 东校园体育场 5", "/assets/maps/map18.png"],
      ["map19", "SYSU 东校园体育场 6", "/assets/maps/map19.png"],
      ["map20", "SYSU 东校园体育场 7", "/assets/maps/map20.png"],
      ["map7", "SYSU 东校园环形大圈", "/assets/maps/map7.png"],
      ["map13", "大学城中环路", "/assets/maps/map13.png"],
      ["map4", "SYSU 英东体育场", "/assets/maps/map4.png"],
      ["map1", "SYSU 南校园大圈", "/assets/maps/map1.png"],
      ["map2", "SYSU 南校园小圈", "/assets/maps/map2.png"],
      ["map3", "SYSU 南校园中轴线", "/assets/maps/map3.png"],
      ["map5", "SYSU 南校园珠江南岸", "/assets/maps/map5.png"],
      ["map12", "二沙岛", "/assets/maps/map12.png"],
      ["map14", "花城广场", "/assets/maps/map14.png"],
      ["map8", "SYSU 珠海校区", "/assets/maps/map8.png"],
      ["map9", "苏州大学", "/assets/maps/map9.png"],
      ["map10", "中央财经大学", "/assets/maps/map10.png"],
      ["map11", "中南大学", "/assets/maps/map11.png"],
    ];

    const form = document.getElementById("dataForm");
    const mapSelect = document.getElementById("mapSelect");
    const weatherStatus = document.getElementById("weatherStatus");
    const canvas = document.getElementById("keepCanvas");
    const ctx = canvas.getContext("2d");
    const imageCache = new Map();

    function mapById(id) {
      return MAP_PRESETS.find(([mapId]) => mapId === id) || MAP_PRESETS.find(([mapId]) => mapId === "map4");
    }

    function setupMaps() {
      for (const [id, label, path] of MAP_PRESETS) {
        const option = document.createElement("option");
        option.value = id;
        option.dataset.path = path;
        option.textContent = label;
        if (id === "map4") option.selected = true;
        mapSelect.append(option);
      }
    }

    function values() {
      return Object.fromEntries(new FormData(form).entries());
    }

    function saveState() {
      localStorage.setItem("keepFormState", JSON.stringify(values()));
    }

    function restoreState() {
      const raw = localStorage.getItem("keepFormState");
      if (!raw) return;
      try {
        const state = JSON.parse(raw);
        for (const [key, value] of Object.entries(state)) {
          const field = form.elements.namedItem(key);
          if (field && typeof value === "string") field.value = value;
        }
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function loadImage(src) {
      if (!imageCache.has(src)) {
        imageCache.set(src, new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        }));
      }
      return imageCache.get(src);
    }

    function text(content, x, y, size, weight = 400, color = "#000", align = "left") {
      ctx.fillStyle = color;
      ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif`;
      ctx.textAlign = align;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(String(content), x, y);
    }

    function roundedRect(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    }

    function divider(y) {
      ctx.fillStyle = "#f7f7f7";
      ctx.fillRect(0, y, 1080, 38);
    }

    function detailButton(x, y) {
      roundedRect(x, y, 170, 72, 36, "#f7f7f7");
      text("查看详情", x + 30, y + 47, 31, 700);
    }

    function dateText(value) {
      return String(value || "").replaceAll("-", "/");
    }

    function paceText(value) {
      return String(value || "").replace(":", "'") + "''";
    }

    async function fetchWeather() {
      const v = values();
      if (!v.date || !v.endTime || !v.map) return;
      weatherStatus.textContent = "正在查询天气...";
      try {
        const response = await fetch(`/api/weather?map=${encodeURIComponent(v.map)}&date=${encodeURIComponent(v.date)}&time=${encodeURIComponent(v.endTime)}`);
        if (!response.ok) throw new Error(`weather ${response.status}`);
        const data = await response.json();
        if (data.weather) form.elements.weather.value = data.weather;
        if (data.temperature) form.elements.temperature.value = data.temperature;
        weatherStatus.textContent = "天气已自动更新。";
        saveState();
        await render();
      } catch {
        weatherStatus.textContent = "天气查询失败，已保留当前手动输入。";
      }
    }

    async function render() {
      const v = values();
      const [, , mapPath] = mapById(v.map);
      const map = await loadImage(mapPath);
      canvas.height = 3820;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      text("‹", 55, 112, 82, 300);
      roundedRect(635, 52, 145, 72, 36, "#f7f7f7");
      text("▣ 隐私", 660, 99, 32, 700);
      text("↗  ⋯", 870, 104, 64, 700);

      roundedRect(65, 168, 74, 74, 37, "#f4f4f4");
      text((v.username || "K").slice(0, 1), 89, 218, 34, 700, "#ddd");
      text(v.username || "keep", 160, 208, 42, 700);
      text(`${dateText(v.date)} ${v.endTime} - ${v.endTime} ${v.location} · ${v.weather} · ${v.temperature}`, 160, 252, 32, 400, "#8f8f94");

      text("🏃 户外跑步", 65, 386, 48, 800, "#292a33");
      text(Number(v.totalKm || 0).toFixed(2), 58, 576, 170, 900);
      text("公里", 438, 576, 48);

      ctx.globalAlpha = 0.72;
      ctx.drawImage(map, 40, 646, 1000, 800);
      ctx.globalAlpha = 1;
      text("慢", 88, 1394, 28, 700, "#e75f6a");
      ctx.strokeStyle = "#2dcfb5";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(130, 1386);
      ctx.lineTo(240, 1386);
      ctx.stroke();
      text("快", 255, 1394, 28, 700, "#14c8cc");
      ctx.fillStyle = "rgba(245,255,249,.9)";
      ctx.fillRect(40, 1446, 1000, 100);
      text("📍 获得了 1 个跑步路线成绩", 85, 1512, 42, 800);
      text("›", 985, 1516, 70, 700);

      text("运动数据", 58, 1666, 48, 800, "#292a33");
      detailButton(835, 1614);
      const metrics = [
        ["训练时长", v.sportTime, "", 58, 1796],
        ["平均配速", v.pace, "", 430, 1796],
        ["运动消耗", v.calories, "千卡", 790, 1796],
        ["总时长", v.totalTime, "", 58, 1956],
        ["运动负荷", v.exerciseLoad, "", 430, 1956],
        ["平均心率", v.heartRate, "次/分", 790, 1956],
        ["平均步频", v.averageCadence, "", 58, 2116],
        ["平均功率", v.power, "瓦", 430, 2116],
        ["平均步幅", v.stride, "米", 790, 2116],
      ];
      for (const [label, value, unit, x, y] of metrics) {
        text(label, x, y, 34, 600, "#a0a0a4");
        text(value, x, y + 72, 58, 900);
        if (unit) text(unit, x + 125, y + 72, 30, 600);
      }

      divider(2276);
      text("运动趋势", 58, 2416, 48, 800, "#292a33");
      roundedRect(270, 2374, 66, 40, 10, "#dcb05c");
      text("会员", 281, 2404, 24, 700, "#fff");
      detailButton(835, 2364);
      text(`与上次 ${(Number(v.totalKm || 0) - .25).toFixed(2)} 公里跑步各项数据对比`, 58, 2531, 34, 700, "#999");
      roundedRect(58, 2616, 145, 58, 29, "#7a5df0");
      text("▲ 上升", 82, 2655, 30, 700, "#fff");
      roundedRect(430, 2616, 145, 58, 29, "#27c798");
      text("▼ 下降", 452, 2655, 30, 700, "#fff");
      roundedRect(790, 2616, 145, 58, 29, "#efefef");
      text("━ 持平", 815, 2655, 30, 700, "#888");
      text("8", 58, 2756, 58, 900);
      text("项", 120, 2756, 28);
      text("4", 430, 2756, 58, 900);
      text("项", 492, 2756, 28);
      text("0", 790, 2756, 58, 900);
      text("项", 852, 2756, 28);

      divider(2841);
      text("特别成就", 58, 2981, 48, 800, "#292a33");
      text("（共 1 个）", 270, 2981, 30, 600, "#999");
      roundedRect(65, 3061, 94, 94, 47, "#eee");
      roundedRect(88, 3084, 48, 48, 24, "#f3d952");
      text("Lv", 97, 3119, 20);
      text("获得新徽章 ›", 200, 3101, 30, 700, "#ccc");
      text("五月挑战 Lv1", 200, 3151, 40, 800);

      divider(3261);
      text("分段详情", 58, 3401, 48, 800, "#292a33");
      roundedRect(705, 3351, 72, 72, 36, "#f7f7f7");
      text("↗", 725, 3403, 40, 700);
      detailButton(835, 3351);
      text("#", 78, 3521, 28, 600, "#999");
      text("公里", 255, 3521, 28, 600, "#999");
      text("用时", 490, 3521, 28, 600, "#999");
      text("配速", 710, 3521, 28, 600, "#999");
      text("心率", 925, 3521, 28, 600, "#999");
      renderRows(v);
    }

    function renderRows(v) {
      const rows = [
        ["1", "", "1.00", v.split1, paceText(v.split1), v.splitHr1],
        ["2", "最快", "1.00", v.split2, paceText(v.split2), v.splitHr2],
        ["3", "", "1.00", v.split3, paceText(v.split3), v.splitHr3],
      ];
      let y = 3596;
      for (const row of rows) {
        const active = row[0] === "2";
        if (active) roundedRect(55, y - 48, 970, 64, 32, "#42ca9d");
        const color = active ? "#fff" : "#666";
        const muted = active ? "#fff" : "#aaa";
        text(row[0], 78, y, 32, 500, muted);
        text(row[1], 160, y, 30, 700, color);
        text(row[2], 255, y, 32, 500, color);
        text(row[3], 490, y, 32, 500, color);
        text(row[4], 710, y, 32, 600, active ? "#fff" : "#20c28e");
        text(row[5], 925, y, 32, 600, active ? "#fff" : "#e54e70");
        y += 80;
      }
    }

    function download() {
      const link = document.createElement("a");
      link.download = `keep-${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function updateLocationFromMap() {
      const [, label] = mapById(mapSelect.value);
      form.elements.location.value = label;
    }

    let weatherTimer = 0;
    function queueWeatherFetch() {
      clearTimeout(weatherTimer);
      weatherTimer = setTimeout(() => fetchWeather(), 350);
    }

    setupMaps();
    restoreState();
    form.addEventListener("input", () => {
      saveState();
      render().catch(console.error);
    });
    for (const name of ["date", "endTime"]) {
      form.elements[name].addEventListener("change", queueWeatherFetch);
    }
    mapSelect.addEventListener("change", () => {
      updateLocationFromMap();
      saveState();
      queueWeatherFetch();
      render().catch(console.error);
    });
    document.getElementById("renderButton").addEventListener("click", () => render().catch(console.error));
    document.getElementById("downloadScreenshot").addEventListener("click", download);
    render().catch(console.error);
  </script>
</body>
</html>
